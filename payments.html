
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payments</title><style>
:root{--neon:#00ff88;}
body{background:linear-gradient(180deg,#FFD700 0%,#B8860B 100%);min-height:100vh;margin:0;font-family:Inter,sans-serif;color:var(--neon);display:grid;place-items:center;padding:24px}
.box{background:rgba(0,0,0,.6);border:2px solid var(--neon);box-shadow:0 0 30px var(--neon);border-radius:24px;padding:28px;max-width:420px;text-align:center}
h1{text-shadow:0 0 20px var(--neon);margin-bottom:12px}
button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid var(--neon);background:#000;color:var(--neon);box-shadow:0 0 10px var(--neon);cursor:pointer;font-weight:700;font-size:15px}
a{color:var(--neon);text-shadow:0 0 10px var(--neon);text-decoration:none;border:1px solid var(--neon);padding:8px 14px;border-radius:10px;display:inline-block;margin-top:12px}
code{background:#000;padding:2px 6px;border-radius:6px}
</style></head><body>
<div class="box">
  <h1>Payments</h1>
  <p>API not connected yet. Add your key in <code>server.js</code> line 8.</p>
  <button id="payBtn">Pay Now</button>
  <p id="status"></p>
  <a href="index.html">← Back Home</a>
</div>
<script>
const API_URL = 'http://localhost:3000'; // Change this after deploy
document.getElementById('payBtn').onclick=async()=>{
  const res=await fetch(API_URL+'/api/pay',{method:'POST'});
  const data=await res.json();
  document.getElementById('status').textContent = data.key_set ? 'API Connected ✅' : 'Add API key in backend ❌';
}
</script></body></html>
